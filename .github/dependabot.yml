version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: nuget
    directories:
      - "/"
      - "/tests/*"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: deps
      include: scope
    groups:
      nuget-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
        group-by: dependency-name

  - package-ecosystem: dotnet-sdk
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 2
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: build
      include: scope
